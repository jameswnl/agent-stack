name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Validate Poetry configuration
        run: poetry check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-

      - name: Install dev dependencies
        run: poetry install --only dev

      - name: Ruff lint
        run: poetry run ruff check src/ tests/

      - name: Ruff format
        run: poetry run ruff format --check src/ tests/

  typecheck:
    name: Type Check (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev --with optional

      - name: Mypy
        continue-on-error: true
        run: poetry run mypy src/ --ignore-missing-imports

  unit-contract:
    name: Unit and Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev --with optional

      - name: Run unit and contract tests
        run: >
          poetry run pytest --no-cov -q
          tests/unit
          tests/contract

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-${{ env.PYTHON_VERSION }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev --with optional

      - name: Prepare runtime directories
        run: mkdir -p data data/users data/uploads

      - name: Run integration tests
        run: >
          poetry run pytest --no-cov -q
          tests/integration/test_api_auth.py
          tests/integration/test_rag_flow.py
          tests/integration/test_research_flow.py
