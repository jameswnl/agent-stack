name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv and Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: ${{ runner.os }}-py311-poetry-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py311-poetry-

      - name: Install dependencies
        run: poetry install --with dev --with optional

      - name: Prepare runtime directories
        run: mkdir -p data data/users data/uploads

      - name: Run non-live test suite
        run: poetry run pytest --no-cov -m "not live" -q
