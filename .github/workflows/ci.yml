name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.7"

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate pyproject.toml
        run: uv lock --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --extra research

      - name: Mypy
        continue-on-error: true
        run: uv run mypy src/ --ignore-missing-imports

  unit-contract:
    name: Unit and Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - validate

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --extra research

      - name: Run unit and contract tests
        run: >
          uv run pytest --no-cov -q
          tests/unit
          tests/contract

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - validate

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --extra research

      - name: Prepare runtime directories
        run: mkdir -p data data/users data/uploads

      - name: Run integration tests
        run: >
          uv run pytest --no-cov -q
          tests/integration/test_api_auth.py
          tests/integration/test_rag_flow.py
          tests/integration/test_research_flow.py
